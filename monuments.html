<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CAAL Workspace - Monuments</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- =========================================
       GLOBAL APP HEADER
       Same shell pattern as Home
       ========================================= -->
  <header class="app-header">
    <div class="app-brand">
      <img
        src="assets/logo_plain.png"
        alt="CAAL project logo"
        class="app-brand-logo"
      />
      <div class="app-brand-text">
        <h1>CAAL Workspace</h1>
        <p>Kazakhstan monuments workspace</p>
      </div>

          <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-link">Home</a>
        <a href="monuments.html" class="nav-link nav-link-active">Monuments</a>
        <a href="archive.html" class="nav-link">Archive</a>
      </nav>
  
      <div class="lang-switcher">
        <label for="languageSelect" data-i18n="language_label">Language</label>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </header>
<!-- =========================================
       MONUMENTS WORKSPACE
       Three main areas:
       1. Browse/search pane
       2. Map pane
       3. Active record pane
       ========================================= -->
  <main class="workspace-shell monuments-workspace">

    <!-- =====================================
         LEFT PANE: SEARCH / RESULTS
         Placeholder, but wired with the existing siteSearch input id
         ===================================== -->
    <aside class="workspace-pane browse-pane">
      <div class="pane-header">
        <h2>Browse</h2>
        <p>Search and consult records</p>
      </div>
    
      <div class="pane-body">
        <div class="search-box search-box-stacked">
          <label for="siteSearch">Search</label>
          <input
            type="text"
            id="siteSearch"
            placeholder="Search names, IDs, types, descriptions..."
          />
        </div>
    
        <div class="browse-controls">
          <label class="browse-checkbox">
            <input type="checkbox" id="showWorkspaceRecords" checked />
            <span>Workspace records</span>
          </label>
    
          <label class="browse-checkbox">
            <input type="checkbox" id="showCaalRecords" checked />
            <span>CAAL records</span>
          </label>
        </div>
    
        <button type="button" class="action-btn filters-toggle" id="toggleFiltersBtn">
          Advanced filters
        </button>
    
        <div class="filters-panel" id="filtersPanel" hidden>
          <div class="filters-grid">
            <div class="filter-group">
              <label for="filterMonumentType">Monument Type</label>
              <select id="filterMonumentType" class="form-control" multiple></select>
            </div>
    
            <div class="filter-group">
              <label for="filterClassification">Classification</label>
              <select id="filterClassification" class="form-control" multiple></select>
            </div>
    
            <div class="filter-group">
              <label for="filterDesignation">Designation</label>
              <select id="filterDesignation" class="form-control" multiple></select>
            </div>
    
            <div class="filter-group">
              <label for="filterReligion">Religion</label>
              <select id="filterReligion" class="form-control" multiple></select>
            </div>
    
            <div class="filter-group">
              <label for="filterCulturalPeriod">Cultural Period</label>
              <select id="filterCulturalPeriod" class="form-control" multiple></select>
            </div>
    
            <div class="filter-group">
              <label for="filterCountry">Country</label>
              <select id="filterCountry" class="form-control" multiple></select>
            </div>
          </div>
    
          <div class="filters-actions">
            <button type="button" class="action-btn" id="clearFiltersBtn">Clear filters</button>
          </div>
        </div>
    
        <div class="results-panel">
          <div class="results-panel-header">
            <h3>Results</h3>
            <p id="resultsCount">0 records</p>
          </div>
    
          <div id="resultsList" class="results-list">
            <div class="results-empty">
              <p>Results will appear here.</p>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ============         CENTRE PANE: MAP         
    Keeps map id so existing Leaflet logic can still run
         ========================================================== -->
    <section class="workspace-pane map-pane">
      <div class="pane-header pane-header-inline">
        <div>
          <h2>Map</h2>
          <p data-i18n="click_prompt">Click a monument on the map</p>
        </div>

        <div class="map-actions">
          <button type="button" id="addPointBtn" class="action-btn primary">
            Add record
          </button>
          <button type="button" id="cancelAddBtn" class="action-btn" hidden>
            Cancel add
          </button>
        </div>
      </div>

      <div class="map-pane-body">
        <div id="map"></div>
      </div>
    </section>

    <!-- =====================================
         RIGHT PANE: ACTIVE RECORD
         Keeps current recordDetails so the existing JS can keep working
         ===================================== -->
    <aside class="workspace-pane detail-pane" id="sidePanel">
      <div class="pane-header">
        <h2 data-i18n="record_details">Record Details</h2>
        <p>Selected monument record</p>
      </div>

      <div class="pane-body" id="recordDetails">
        <div class="empty-state">
          <p data-i18n="no_record_selected">No record selected yet.</p>
        </div>
      </div>
    </aside>

  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
